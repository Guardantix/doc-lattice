name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.13', '3.14']
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --locked --group dev
      - run: uv run --no-sync ruff check src/ tests/
      - run: uv run --no-sync ruff format --check src/ tests/
      - run: uv run --no-sync ty check src/
      - run: uv run --no-sync python scripts/check_typing_boundaries.py src/
      - run: uv run --no-sync python scripts/check_version_sync.py

  # --- semgrep start ---
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.61.0
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --error --config=p/python --config=p/security-audit --config=p/secrets
  # --- semgrep end ---

  tests:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ['3.13', '3.14']
    env:
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python }}
      - run: uv sync --locked --group dev
      - run: uv run --no-sync pytest

  release:
    name: Release
    needs: [code-quality, tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
      create_tag: ${{ steps.gate.outputs.create_tag }}
      version: ${{ steps.target.outputs.version }}
      tag: ${{ steps.target.outputs.tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --locked --group dev

      - name: Determine target tag
        id: target
        run: |
          version="$(uv run --no-sync python -c 'import doc_lattice; print(doc_lattice.__version__)')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Tag-health gate
        id: gate
        env:
          TAG: ${{ steps.target.outputs.tag }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            tagged="$(git show "${TAG}:src/doc_lattice/__init__.py" | sed -n 's/^__version__ = "\(.*\)"/\1/p')"
            tagged_sha="$(git rev-list -n 1 "${TAG}")"
            if [ "${tagged}" != "${VERSION}" ]; then
              echo "::error::Tag ${TAG} points at version '${tagged}', not ${VERSION}."
              exit 1
            elif [ "${tagged_sha}" = "${GITHUB_SHA}" ]; then
              echo "Tag ${TAG} already identifies this commit; retrying release work."
              echo "proceed=true" >> "$GITHUB_OUTPUT"
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
            else
              echo "Tag ${TAG} already exists at version ${VERSION}; ordinary no-op."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              echo "create_tag=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-assert version sync
        if: steps.gate.outputs.proceed == 'true'
        run: uv run --no-sync python scripts/check_version_sync.py

      - name: Smoke-test the commit
        if: steps.gate.outputs.proceed == 'true'
        run: |
          ref="git+https://github.com/Guardantix/doc-lattice@${GITHUB_SHA}"
          fixture="tests/fixtures/release-smoke/.doc-lattice.yml"
          uvx --python 3.13 --from "${ref}" doc-lattice check --config "${fixture}"
          uvx --python 3.13 --from "${ref}" doc-lattice lint --config "${fixture}"
          workdir="$(mktemp -d)"
          ( cd "${workdir}" && uvx --python 3.13 --from "${ref}" doc-lattice init )

      - name: Create and push the tag
        if: steps.gate.outputs.create_tag == 'true'
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "${TAG}"

      - name: Publish release notes
        if: steps.gate.outputs.proceed == 'true'
        env:
          TAG: ${{ steps.target.outputs.tag }}
          VERSION: ${{ steps.target.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists; leaving it unchanged."
          else
            uv run --no-sync python scripts/extract_release_notes.py "${VERSION}" > release-notes.md
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md --verify-tag
          fi

      - name: Confirm pinned ref resolves
        if: steps.gate.outputs.proceed == 'true'
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          uvx --python 3.13 --from "git+https://github.com/Guardantix/doc-lattice@${TAG}" doc-lattice --version

  publish:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - uses: astral-sh/setup-uv@v6
      - name: Build distributions
        run: uv build
      - name: Validate distributions
        run: uvx --from twine twine check dist/*
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
